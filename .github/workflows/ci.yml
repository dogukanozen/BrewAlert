name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory coverage/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 1

  publish:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: brewalert-win-x64
            out: publish\
            executable: BrewAlert.UI.exe
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: brewalert-linux-arm64
            out: publish/
            executable: BrewAlert.UI
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Get version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Publish (${{ matrix.rid }})
        run: dotnet publish src/BrewAlert.UI -c Release -r ${{ matrix.rid }} --self-contained -o ${{ matrix.out }} /p:Version=${{ env.APP_VERSION }}

      - name: Velopack Pack
        shell: pwsh
        run: |
          vpk pack -u BrewAlert -v ${{ env.APP_VERSION }} -p ${{ matrix.out }} -e ${{ matrix.executable }}

      - name: Bundle install.sh into tar.gz (Linux)
        if: runner.os == 'Linux'
        run: |
          cp scripts/install.sh ${{ matrix.out }}install.sh
          chmod +x ${{ matrix.out }}install.sh
          tar -czf brewalert-${{ env.APP_VERSION }}-${{ matrix.rid }}.tar.gz \
            -C ${{ matrix.out }} .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Releases/*
            brewalert-*.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
