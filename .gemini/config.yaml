have_fun: false

code_review:
  disable: false
  comment_severity_threshold: 'HIGH'
  max_review_comments: 20
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: false

ignore_patterns:
  - "**/*.lock"
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/node_modules/**"
  - "**/build/**"
  - "**/dist/**"
  - "frontend/src/components/ui/**"
  - "memory/**"
  - "**/.env*"
